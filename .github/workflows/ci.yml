name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + test against real PostgreSQL ──────────────────────
  test-backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cspm
          POSTGRES_PASSWORD: cspm
          POSTGRES_DB: cspm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://cspm:cspm@localhost:5432/cspm_test"
      REDIS_URL: "redis://localhost:6379/0"
      DEBUG: "true"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      CREDENTIAL_ENCRYPTION_KEY: "dGobVEboxqrlrFeAn9pC4X7FRkJgypcWVmQ0Ry_FVFw="

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install uv
        run: pip install uv --quiet

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint — ruff check
        run: ruff check app/ tests/ --select E,F,W --ignore E501
        continue-on-error: true

      - name: Run tests
        run: pytest --tb=short -q

  # ── Frontend: lint + typecheck + build ────────────────────────────────
  test-frontend:
    name: Frontend — lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.4"

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: pnpm build
